{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="bg-gray-50 dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
    <h1 class="py-8 text-2xl font-sans">اتوماسیون اداری دریان پالاست</h1>
      <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">    
          <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
      <form method="post" class="space-y-4 md:space-y-6">
  {% csrf_token %}

  <div>
    {{ form.username.label_tag }}
    {{ form.username }}
    {{ form.username.errors }}
  </div>

  <div>
    {{ form.password.label_tag }}
    {{ form.password }}
    {{ form.password.errors }}
  </div>

  <button type="submit"
    class="w-full text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5">
    Sign in
  </button>
</form>


          </div>
      </div>
  </div>
</section>
{% endblock %}
